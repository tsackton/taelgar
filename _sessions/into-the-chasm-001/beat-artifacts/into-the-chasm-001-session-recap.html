        left: 15px;
        width: 2px;
        background: linear-gradient(180deg, rgba(217, 241, 255, 0.55), rgba(217, 241, 255, 0.08));

        width: 20px;
        height: 20px;

        background: linear-gradient(180deg, var(--accent-strong), var(--accent));

        background: linear-gradient(180deg, rgba(159, 215, 255, 0.92), rgba(159, 215, 255, 0.1));

        background: rgba(229, 141, 122, 0.14);
      }

        display: inline-flex;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;

        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--warm), rgba(243, 201, 139, 0.1));
      }

      .card-summary {
        margin: 14px 0 0;
        font-size: clamp(1rem, 1.65vw, 1.12rem);
        line-height: 1.8;
        color: var(--text);
      }

      .card.is-plain .card-summary {
        margin: 0;
        font-size: clamp(1.06rem, 1.8vw, 1.2rem);
        color: var(--accent-strong);
      }

      .card-note {
        margin-top: 16px;
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.65;
      }

      .transcript {
        margin-top: 18px;
        display: grid;
        gap: 14px;
      }

      .turn {
        display: grid;
        gap: 6px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(204, 230, 255, 0.08);
      }

      .turn-speaker {
        color: var(--accent);
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .turn[data-speaker="DM"] .turn-speaker {
        color: var(--warm);
      }

      .turn-text {
        margin: 0;
        color: var(--text);
        font-size: 1rem;
        line-height: 1.75;
      }

      .legend {
        margin-top: 20px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
      }

      @media (max-width: 860px) {
        .page {
          width: min(100vw - 24px, 1120px);
          padding-top: 24px;

          padding: 24px 18px;
        }

        .hero-grid {
          grid-template-columns: 1fr;
        }

        .zoom-panel {

        }

        .timeline::before {

        }

        .card {
          margin-left: 32px;
          padding: 18px 18px 20px;
        }

        .card.is-plain {
          margin-left: 0;
          padding: 0;
        }

        .card::before {
          left: -28px;
          width: 16px;
          height: 16px;
        }

        .card-header {
          flex-direction: column;
        }
      }
    </style>

        recapBlocks: [

      const transcriptByBeat = {"beat-001":[["Ekko","Yeah, isn't… Should we also acknowledge this momentous occasion?"],["Finnan","That's awesome, I love it."],["DM","Tim as a player. I know."],["Ekko","like, no, this has been, like, what, our lifetimes in the making? Tim as a player, in fact."],["DM","It's true."],["Ekko","Turning over the reins to his brother, his beloved brother, now, as the DM. This is pretty fucking epic, I'm just saying. Great."],["DM","Tim's kind of a high, high, a difficult act to follow."],["Eolo","Yeah, it's true."],["Finnan","I'm sure it will be amazing."],["Ekko","I'm stoked, though, Mike. This is…"],["DM","Fast."],["Ekko","Yeah, shout out to Tim, this is great."],["DM","So… forget everything we said last session. I mean, obviously all the world building and character building, fine, but I have a… I have a new intro to start over with, and then… and if we're feeling complicated, I might break us into two breakout rooms to do two different things. Just to get every… because you're in two separate spots. Right, because…"],["Ekko","Breakout rooms. I like those."],["Finnan","We did that at the beginning of the Dunmari campaign."],["DM","that way."],["Finnan","Every now. Yeah. Like, the very f- the very first adventure."],["DM","session."],["Finnan","breakout."],["DM","Yeah."],["Finnan","Session, a breakout room with each one of you for the intros."],["DM","South. Let me just turn on… sorry, the…"],["Finnan","Good."],["DM","For as long as anybody remembers, the Great Chasm has split Zimkova like a wound, an impossible cleft that plunges into endless depths, from which strangeness typically emerges. Spires of impossible buildings, unexpected lights, storms and winds that seem to defy gravity, and unusual and unseasonable plants that the Kenku sometimes harvest. Although many in the region see it as the home of Zeyfa, the cruel west wind of Zimkovan legends, not all do. The Kenku monks of the Kemeko Monastery see it as a place of safety and refuge, where they can train unwatched by the outside world, and safe from danger. And the mystics of the Vejo Vaikai believe the chasm is a place of elemental balance and great power. The summer of 1729 in Zimkova started fine and fair, but by late August. Rumors of an orcish horde led by a fearsome orc calling herself the Ravager of Winter. had started to spread across Breva. In early September, the news came. A great battle had been fought north of the chasm between the dwarves of Nidzahar, apparently aided by a large contingent of Stoneborn and the orcish horde. The Ravager was killed, and the bulk of the orcs were defeated. But scattered bands fled south to Breva like angry wasps, and the Mezai, the Woodswalkers. And many others were kept busy defending the people from these scattered orc hordes. So few noticed as the first signs came of the chasm changing. A summer thunderstorm, thick and warm, burst forth from the chasm in October. But this had happened before, and although it wasn't common, no one really remarked on it. A sandstorm, thick and dry, with scorching heat, came out of the chasm in November. A boulder of volcanic stone, a flame with green fire, tumbled down the river that flows out of the chasm and floated all the way to the green sea, unquenched by water. That was remarked on as mighty strange. In December, a rainbow appeared. That stretched across the sky over the chasm, and a day later, it shattered into hundreds of thousands of glass shards that drifted to the ground across the chasm and fell in. That was widely seen as an omen, but few could say what it meant. When the rainbow sign was followed by a living sheet of ice that swam out of the chasm and left behind… and swam down the Teft, the main river, like a predator, leaving behind dead fish and… frozen banks in its wake, many in Breva began to believe Zeyfa was angry, and the chasm needed to be appeased. And then, at the start of January, the sky above the chasm turned black, and held darkness       const state = { zoomIndex: 0 };
      const sessionSummary = document.getElementById("session-summary");
      const timeline = document.getElementById("timeline");
      const zoomButtons = document.getElementById("zoom-buttons");
      const zoomDescription = document.getElementById("zoom-description");

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function mergeTranscriptTurns(turns) {
        const merged = [];
        for (const [speaker, text] of turns) {
          const cleanText = String(text || "").replace(/\s+/g, " ").trim();
          if (!cleanText) continue;
          const prev = merged[merged.length - 1];
          if (prev && prev[0] === speaker) {
            prev[1] += ` ${cleanText}`;
          } else {
            merged.push([speaker, cleanText]);
          }
        }
        return merged;
      }

      function transcriptTurnsForBlock(block) {
        const turns = [];
        for (const beatId of block.beatIds) {
          const beatTurns = transcriptByBeat[beatId] || [];
          for (const turn of beatTurns) turns.push(turn);
        }
        return mergeTranscriptTurns(turns);
      }

      function renderZoomButtons() {
        zoomButtons.innerHTML = zoomLevels
          .map((level, index) => {
            const active = index === state.zoomIndex ? " is-active" : "";
            return `
              <button
                type="button"
                class="zoom-button${active}"
                data-index="${index}"
                aria-pressed="${index === state.zoomIndex}"
              >
                <strong>${escapeHtml(level.label)}</strong>
                <span>${escapeHtml(level.shortLabel)}</span>
              </button>
            `;
          })
          .join("");

        zoomButtons.querySelectorAll(".zoom-button").forEach((button) => {
          button.addEventListener("click", () => {
            state.zoomIndex = Number(button.dataset.index);
            render();
          });
        });
      }

      function renderTimeline() {
        const activeLevel = zoomLevels[state.zoomIndex];
        timeline.innerHTML = appData.recapBlocks
          .map((block, index) => {
            if (activeLevel.key === "transcript") {
              const transcriptTurns = transcriptTurnsForBlock(block);
              const transcriptHtml = transcriptTurns
                .map(
                  ([speaker, text]) => `
                    <div class="turn" data-speaker="${escapeHtml(speaker)}">
                      <div class="turn-speaker">${escapeHtml(speaker)}</div>
                      <p class="turn-text">${escapeHtml(text)}</p>
                    </div>
                  `
                )
                .join("");

              return `
                <article class="card" data-kind="${escapeHtml(block.kind)}" aria-labelledby="${escapeHtml(block.blockId)}-title">
                  <div class="card-header">
                    <div class="card-title-wrap">
                      <div class="card-kicker">${String(index + 1).padStart(2, "0")}</div>
                      <h2 id="${escapeHtml(block.blockId)}-title">${escapeHtml(block.title)}</h2>
                    </div>
                  </div>
                  <div class="transcript">
                    ${transcriptHtml}
                  </div>
                </article>
              `;
            }

            const summary = block[activeLevel.key];
            if (activeLevel.key !== "longSummary") {
              return `
                <article class="card is-plain">
                  <p class="card-summary">${escapeHtml(summary)}</p>
                </article>
              `;
            }

            return `
              <article class="card" data-kind="${escapeHtml(block.kind)}" aria-labelledby="${escapeHtml(block.blockId)}-title">
                <div class="card-header">
                  <div class="card-title-wrap">
                    <div class="card-kicker">${String(index + 1).padStart(2, "0")}</div>
                    <h2 id="${escapeHtml(block.blockId)}-title">${escapeHtml(block.title)}</h2>
                  </div>
                </div>
                <p class="card-summary">${escapeHtml(summary)}</p>
              </article>
            `;
          })
          .join("");
      }

      function render() {
        const activeLevel = zoomLevels[state.zoomIndex];
        sessionSummary.textContent = appData.sessionSummary;
        zoomDescription.textContent = activeLevel.description;
        document.title = `${appData.sessionTitle} Session ${appData.sessionNumber} Recap · ${activeLevel.label}`;
        renderZoomButtons();
        renderTimeline();
      }

      window.addEventListener("keydown", (event) => {
        if (event.key === "1" || event.key === "2" || event.key === "3" || event.key === "4") {
          state.zoomIndex = Number(event.key) - 1;
          render();
        }
      });

      render();
    </script>
  </body>
</html>
